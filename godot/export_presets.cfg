; Export presets for HexSnake (Godot 4.7).
; Building requires export templates (auto-installed by the CI workflow, or manually
; via Editor > Manage Export Templates > Download).

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/HexSnake.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=false
binary_format/archive="x86_64"
texture_format/bptc=true
texture_format/s3tc=true

[preset.1]

name="Linux"
platform="Linux"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/HexSnake.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.1.options]

custom_template/debug=""
custom_template/release=""
binary_format/architecture="x86_64"
texture_format/bptc=true
texture_format/s3tc=true

[preset.2]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
