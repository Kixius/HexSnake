<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 95,28 95,72 50,95 5,72 5,28' fill='%232dd4bf'/%3E%3C/svg%3E" />
    <title>HexSnake</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0e1116;
      }
      body {
        font-family: 'Consolas', 'SFMono-Regular', 'Courier New', monospace;
        -webkit-font-smoothing: none;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: default;
      }
      /* Subtle CRT scanline overlay (retro touch, pointer-events passthrough). */
      .scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0.10) 3px,
          rgba(0, 0, 0, 0) 4px
        );
        mix-blend-mode: multiply;
        opacity: 0.6;
      }
      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9;
        background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%);
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
